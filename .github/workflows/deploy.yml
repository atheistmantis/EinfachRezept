name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Inject site PAT (base64-encoded)
        env:
          SITE_PAT: ${{ secrets.SITE_PAT }}
        run: |
          if [ -z "$SITE_PAT" ]; then
            echo "::warning::Repository secret SITE_PAT is not set. Admins will not be able to save changes globally."
          else
            ENCODED=$(printf '%s' "$SITE_PAT" | base64 -w 0)
            sed -i "s|__SITE_PAT_B64__|${ENCODED}|g" js/github.js
          fi

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - uses: actions/deploy-pages@v4
        id: deployment

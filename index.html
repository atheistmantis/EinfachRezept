<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EinfachRezept</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <canvas id="bg" aria-hidden="true"></canvas>
    <button id="login-toggle" type="button" class="action-button small ghost login-toggle" aria-expanded="false">
      Login
    </button>
    <aside class="control-dock hidden" id="control-dock" aria-label="Seitenverwaltung" aria-hidden="true">
      <div class="control-dock-header">
        <button id="close-dock-button" type="button" class="action-button ghost small">Schließen</button>
      </div>
      <section class="control-card" aria-labelledby="login-title">
        <h2 id="login-title">Login</h2>
        <form id="login-form" class="stack">
          <label for="login-username">Benutzername</label>
          <input id="login-username" name="username" type="text" required autocomplete="username" />
          <label for="login-password">Passwort</label>
          <input
            id="login-password"
            name="password"
            type="password"
            required
            autocomplete="current-password"
          />
          <button type="submit" class="action-button small">Anmelden</button>
        </form>
        <p id="session-status" class="status" role="status" aria-live="polite">Nicht angemeldet.</p>
        <button id="logout-button" type="button" class="action-button ghost small hidden">Abmelden</button>
      </section>

      <section class="control-card hidden" id="editor-panel" aria-labelledby="editor-title">
        <h3 id="editor-title">Design & Inhalte bearbeiten</h3>
        <div class="spider-map-open-wrapper">
          <button id="spider-map-open" type="button" class="action-button small">🕸 Spider Map</button>
        </div>
        <form id="editor-form" class="stack">
          <label for="title-input">Titel</label>
          <input id="title-input" name="title" type="text" />
          <label for="subtitle-input">Untertitel</label>
          <input id="subtitle-input" name="subtitle" type="text" />
          <label for="start-label-input">Start-Button</label>
          <input id="start-label-input" name="startLabel" type="text" />
          <label for="category-label-input">Kategorie-Überschrift</label>
          <input id="category-label-input" name="categoryLabel" type="text" />
          <label for="background-image-file-input">Landingpage Hintergrundbild (optional)</label>
          <input id="background-image-input" name="backgroundImageUrl" type="hidden" />
          <input id="background-image-file-input" name="backgroundImageFile" type="file" accept="image/*" />
          <p id="background-image-status" class="status">Kein Bild gewählt.</p>
          <button id="clear-background-image" type="button" class="action-button ghost small">Bild entfernen</button>
          <label for="category-background-image-file-input">Kategorien Hintergrundbild (optional)</label>
          <input id="category-background-image-input" name="categoryBackgroundImageUrl" type="hidden" />
          <input id="category-background-image-file-input" name="categoryBackgroundImageFile" type="file" accept="image/*" />
          <p id="category-background-image-status" class="status">Kein Bild gewählt.</p>
          <button id="clear-category-background-image" type="button" class="action-button ghost small">Bild entfernen</button>
          <label for="accent-color-input">Akzentfarbe</label>
          <input id="accent-color-input" name="accentColor" type="color" />
          <label for="text-color-input">Textfarbe</label>
          <input id="text-color-input" name="textColor" type="color" />
          <label for="bg-color-input">Hintergrundfarbe</label>
          <input id="bg-color-input" name="backgroundColor" type="color" />
          <label for="overlay-color-input">Overlay-Farbe</label>
          <input id="overlay-color-input" name="overlayColor" type="color" />
          <label for="overlay-opacity-input">Overlay-Stärke</label>
          <input id="overlay-opacity-input" name="overlayOpacity" type="range" min="0" max="1" step="0.01" />
          <label for="animation-speed-input">Animationsgeschwindigkeit</label>
          <input id="animation-speed-input" name="animationSpeed" type="range" min="0.05" max="1.5" step="0.05" />
          <label for="wave-strength-input">Flow-Stärke</label>
          <input id="wave-strength-input" name="waveStrength" type="range" min="0.1" max="1.8" step="0.05" />
          <label for="glow-strength-input">Glow-Stärke</label>
          <input id="glow-strength-input" name="glowStrength" type="range" min="0.05" max="1" step="0.01" />
          <label for="btn-font-family-input">Button Schriftart</label>
          <select id="btn-font-family-input" name="buttonFontFamily">
            <option value="Arial, Helvetica, sans-serif">Arial</option>
            <option value="Verdana, Geneva, sans-serif">Verdana</option>
            <option value="Tahoma, Geneva, sans-serif">Tahoma</option>
            <option value="'Trebuchet MS', Helvetica, sans-serif">Trebuchet MS</option>
            <option value="Georgia, 'Times New Roman', serif">Georgia</option>
            <option value="'Times New Roman', Times, serif">Times New Roman</option>
            <option value="'Palatino Linotype', 'Book Antiqua', Palatino, serif">Palatino</option>
            <option value="'Courier New', Courier, monospace">Courier New</option>
            <option value="Impact, Charcoal, sans-serif">Impact</option>
            <option value="'Comic Sans MS', cursive">Comic Sans MS</option>
          </select>
          <label for="btn-font-weight-input">Button Schriftstärke</label>
          <select id="btn-font-weight-input" name="buttonFontWeight">
            <option value="300">Light (300)</option>
            <option value="400">Normal (400)</option>
            <option value="500">Medium (500)</option>
            <option value="600">Semibold (600)</option>
            <option value="700">Bold (700)</option>
            <option value="800">Extrabold (800)</option>
            <option value="900">Black (900)</option>
          </select>
          <label for="btn-border-radius-input">Button Eckenradius</label>
          <input id="btn-border-radius-input" name="buttonBorderRadius" type="range" min="0" max="3" step="0.05" />
          <label for="btn-font-size-input">Button Schriftgröße</label>
          <input id="btn-font-size-input" name="buttonFontSize" type="range" min="0.8" max="3" step="0.05" />
          <div class="button-editor-header">
            <h4>Kategorie-Buttons</h4>
            <button id="add-category-button" type="button" class="action-button ghost small">Button hinzufügen</button>
          </div>
          <div id="button-edit-list" class="stack"></div>
          <div class="button-grid">
            <button id="undo-button" type="button" class="action-button ghost small">Rückgängig</button>
            <button id="redo-button" type="button" class="action-button ghost small">Wiederholen</button>
            <button type="submit" class="action-button small">Änderungen speichern</button>
            <button id="reset-button" type="button" class="action-button ghost small">Standard wiederherstellen</button>
          </div>
        </form>
      </section>
    </aside>

    <main>
      <section class="panel hero" id="top" aria-labelledby="site-title">
        <h1 id="site-title">EinfachRezept</h1>
        <p class="subtitle" id="subtitle">Einfach. Schnell. Gut lesbar.</p>
        <button id="start-button" class="action-button">START</button>
      </section>

      <section class="panel" id="category" aria-labelledby="category-title">
        <h2 id="category-title">Wähle eine Basis</h2>
        <div class="button-grid button-row" id="category-buttons"></div>
      </section>
      <div id="options-container"></div>
    </main>
    <div id="spider-map-overlay" class="spider-map-overlay hidden" aria-hidden="true" role="dialog" aria-label="Spider Map Editor" aria-modal="true">
      <div class="spider-map-toolbar">
        <span class="spider-map-title">Spider Map – Webseiten-Übersicht</span>
        <span class="spider-map-legend" aria-hidden="true">
          <span class="sm-legend-dot haupt"></span> Haupt-Button
          <span class="sm-legend-dot side"></span> Side-Button
        </span>
        <button id="spider-map-add-haupt" type="button" class="action-button small">+ Haupt-Button</button>
        <button id="spider-map-close" type="button" class="action-button ghost small">Schließen</button>
      </div>
      <div id="spider-map-canvas" class="spider-map-canvas">
        <svg id="spider-map-svg" class="spider-map-svg" aria-hidden="true"></svg>
      </div>
    </div>
    <script src="./app.js"></script>
  </body>
</html>
